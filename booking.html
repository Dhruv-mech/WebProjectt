<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>Booking | Foodie's Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html">FOODIE'S HUB</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
                <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
                <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                <li class="nav-item"><a class="btn btn-gold ms-lg-3 active" href="booking.html">Book Now</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="page-hero">
    <div class="container">
        <h1>Reserve a Table</h1>
    </div>
</div>

<div class="container section-padding">
    <form id="bookingForm" class="form-wrapper">
        <input id="bname" class="form-control mb-3" placeholder="Name">
        <input id="bemail" class="form-control mb-3" placeholder="Email">
        <input type="date" id="bdate" class="form-control mb-3">
        <input type="time" id="btime" class="form-control mb-3">
        <input type="number" id="bguests" class="form-control mb-3" placeholder="Number of Guests">
        <button type="submit" class="btn btn-gold w-100">Book Table</button>
    </form>
    <p id="bookingMsg" class="text-center mt-3"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
